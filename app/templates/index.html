<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaiper — Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: #888;
            margin-bottom: 32px;
            font-size: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus {
            border-color: #555;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zaiper</h1>
        <p>Sync your Canvas assignments to Notion automatically.</p>
        <form action="/setup" method="POST">
            <label>Canvas API Token</label>
            <input type="password" name="canvas_token" placeholder="Paste your Canvas token" required />
            <label>Notion Integration Token</label>
            <input type="password" name="notion_token" placeholder="Paste your Notion secret_ token" required />
            <label>Notion Database ID</label>
            <input type="text" name="notion_database_id" placeholder="Paste your database ID" required />
            <label>Canvas LMS URL</label>
            <input type="text" name="canvas_base_url" placeholder="e.g. https://kettering.instructure.com" required />
            <button type="submit">Connect & Sync →</button>
        </form>
    </div>
</body>
</html>
